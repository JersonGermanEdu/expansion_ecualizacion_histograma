<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expansion y Ecualización de Histogramas</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
</head>
</head>

<body>
    <h1>Expansion y Ecualización de Histogramas</h1>
    <div class="container row mx-auto">
        <section class="section col-sm-6">
            <h2 style="margin-bottom: 20px;">Imagen original</h2>
            <div class="card border-0">
                <label class="button" for="inputFile">Cargar imagen</label>
                <input type="file" id="inputFile" accept="image/jpeg,image/jpg">
                <div class="image-preview">
                    <img id="imgCargada" alt="Vista previa de la imagen" />
                </div>
            </div>
        </section>
        <section class="section col-sm-6">
            <div class="header">
                <h2>Procesar Expansión de Histograma</h2>
                <div class="group-options">
                    <label><input type="radio" name="opciones" id="rdExpansion" checked>Expansión</label>
                    <label><input type="radio" name="opciones" id="rdEcualizacion"> Ecualización</label>
                </div>
            </div>
            <div class="card border-0">
                <button class="button" id="btnProcesar" disabled>Procesar imagen</button>
                <canvas id="lienzo"></canvas>
            </div>
        </section>

    </div>
    <div class="container row mx-auto">
        <section class="section col-sm-6">
            <div id="tester" style="width:600px;height:250px;"></div>
        </section>
        <section class="section col-sm-6">
            <div id="tester2" style="width:600px;height:250px;"></div>
        </section>
    </div>

    <script>
        var trace1 = {
            type: 'bar',
            x: Array.from({ length: 256 }, (_, i) => i),
            y: Array.from({length:256}, ()=>Math.floor(Math.random() * 256) ),
            marker: {
                color: '#CCCCCC',
                line: {
                    width: 1.5
                }
            }
        };

        var data = [trace1];

        var layout = {
            title: {
                text: 'Histograma original',
            },
            font: { size: 18, color: '#222222' },
            xaxis: {
                title: {
                    text: 'Intensidad de píxel',
                    font: {
                        size: 18,
                        color: '#7f7f7f'
                    }
                }
            },

        };

        var config = { responsive: true }

        Plotly.newPlot('tester', data, layout, config);
        // Plotly.newPlot('tester2', data, layout, config);

    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"     crossorigin="anonymous"></script>
    <script src="scripts/histograma.js"></script>
    <script src="scripts/index.js"></script>
</body>

</html>
